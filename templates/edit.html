<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Transaction</title>
</head>

<body>

<h1>Edit Transaction</h1>

<form method="post" action="{{ url_for('edit', id=transaction.id) }}">

    <label>Date:</label>
    <input type="date" name="date" value="{{ transaction.date }}" required>

    <br><br>

    <label>Category:</label>
    <select name="category">
        {% for c in categories %}
        <option value="{{ c.name }}" {% if c.name == transaction.category %}selected{% endif %}>
            {{ c.name }}
        </option>
        {% endfor %}
    </select>

    <br><br>

    <label>Type:</label>
    <select name="type">
        <option value="income" {% if transaction.type == "income" %}selected{% endif %}>Income</option>
        <option value="expense" {% if transaction.type == "expense" %}selected{% endif %}>Expense</option>
    </select>

    <br><br>

    <label>Amount:</label>
    <input type="number" step="0.01" name="amount" value="{{ transaction.amount }}" required>

    <br><br>

    <label>Notes:</label>
    <input type="text" name="notes" value="{{ transaction.notes }}">

    <br><br>

    <button type="submit">Update</button>
</form>

<hr>

<p>
    <a href="{{ url_for('index') }}">Home</a>
</p>

</body>
</html>
