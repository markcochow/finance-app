<!DOCTYPE html>
<html>
<head>
    <title>Account Balance</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">

    <h1>Account Balance</h1>

    <div class="card">
        <h2>Current Balance</h2>
        <p class="balance">HK$ {{ balance }}</p>
    </div>

    <div class="card">
        <h2>Add Adjustment</h2>
        <form method="POST">

            <div class="form-group">
                <label>Amount (+ or -)</label>
                <input type="number" step="0.01" name="amount" required>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required>
            </div>

            <div class="form-group">
                <label>Note</label>
                <textarea name="note"></textarea>
            </div>

            <button type="submit">Add Adjustment</button>
        </form>
    </div>

    <div class="card">
        <h2>History</h2>
        <table>
            <tr>
                <th>Amount</th>
                <th>Date</th>
                <th>Note</th>
            </tr>

            {% for h in history %}
            <tr>
                <td class="{{ 'income' if h.amount > 0 else 'expense' }}">
                    HK$ {{ h.amount }}
                </td>
                <td>{{ h.date }}</td>
                <td>{{ h.note }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>
</body>
</html>
