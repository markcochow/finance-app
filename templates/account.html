<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Balance</title>
</head>

<body>

<h1>Account Balance</h1>

<p>Total Balance: {{ balance }}</p>
<p>Date: {{ current_date }}</p>

<hr>

<h2>Manual Adjustment</h2>

<form method="post" action="{{ url_for('add') }}">
    <input type="hidden" name="category" value="Adjustment">
    <input type="hidden" name="notes" value="Manual adjustment">

    <label>Date:</label>
    <input type="date" name="date" value="{{ current_date }}" required>

    <label>Type:</label>
    <select name="type">
        <option value="income">Increase</option>
        <option value="expense">Decrease</option>
    </select>

    <label>Amount:</label>
    <input type="number" step="0.01" name="amount" required>

    <button type="submit">Apply</button>
</form>

<hr>

<p>
    <a href="{{ url_for('index') }}">Home</a>
</p>

</body>
</html>
