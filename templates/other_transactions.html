<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Other Transactions</title>
</head>

<body>

<h1>Other Transactions</h1>

<form method="get" action="{{ url_for('other_transactions') }}">
    <label>Start Month:</label>
    <input type="month" name="start" value="{{ start_month }}">

    <label>End Month:</label>
    <input type="month" name="end" value="{{ end_month }}">

    <button type="submit">Apply</button>
</form>

<hr>

<h2>Summary</h2>
<p>Income: {{ income }}</p>
<p>Expense: {{ expense }}</p>
<p>Balance: {{ balance }}</p>

<hr>

<h2>Transactions</h2>

<table border="1" cellpadding="5">
    <tr>
        <th>Date</th>
        <th>Category</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Notes</th>
    </tr>

    {% for t in transactions %}
    <tr>
        <td>{{ t.date }}</td>
        <td>{{ t.category }}</td>
        <td>{{ t.type }}</td>
        <td>{{ t.amount }}</td>
        <td>{{ t.notes }}</td>
    </tr>
    {% endfor %}
</table>

<hr>

<p>
    <a href="{{ url_for('index') }}">Home</a>
</p>

</body>
</html>
