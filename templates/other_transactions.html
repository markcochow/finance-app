<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Other Transactions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="top-bar">
    <div class="nav-links">
        <a href="{{ url_for('index') }}">Home</a>
    </div>
</div>

<div class="container">

<h1>Other Transactions</h1>

<form method="get">
    <label>Start Month</label>
    <input type="month" name="start" value="{{ start_month }}">

    <label>End Month</label>
    <input type="month" name="end" value="{{ end_month }}">

    <button type="submit">Apply</button>
</form>

<div class="summary-cards">
    <div class="card income">
        <h3>Income</h3>
        <p>{{ income }}</p>
    </div>

    <div class="card expense">
        <h3>Expense</h3>
        <p>{{ expense }}</p>
    </div>

    <div class="card balance">
        <h3>Balance</h3>
        <p>{{ balance }}</p>
    </div>
</div>

<div class="table-box">
<table>
    <tr>
        <th>Date</th>
        <th>Category</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Notes</th>
    </tr>

    {% for t in transactions %}
    <tr>
        <td>{{ t.date }}</td>
        <td>{{ t.category }}</td>
        <td>{{ t.type }}</td>
        <td>{{ t.amount }}</td>
        <td>{{ t.notes }}</td>
    </tr>
    {% endfor %}
</table>
</div>

</div>

</body>
</html>
