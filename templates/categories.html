<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Categories</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="top-bar">
    <div class="nav-links">
        <a href="{{ url_for('index') }}">Home</a>
    </div>
</div>

<div class="container">

<h1>Categories Summary</h1>

<div class="table-box">
<table>
    <tr>
        <th>Category</th>
        <th>Total Income</th>
        <th>Total Expense</th>
        <th>Net</th>
    </tr>

    {% for r in rows %}
    <tr>
        <td>{{ r.category }}</td>
        <td>{{ r.income or 0 }}</td>
        <td>{{ r.expense or 0 }}</td>
        <td>{{ (r.income or 0) - (r.expense or 0) }}</td>
    </tr>
    {% endfor %}
</table>
</div>

</div>

</body>
</html>
