<!DOCTYPE html>
<html>
<head>
    <title>Categories</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">

    <h1>Categories</h1>

    <div class="card">
        <h2>Add New Category</h2>
        <form method="POST">
            <div class="form-group">
                <label>Category Name</label>
                <input type="text" name="name" placeholder="e.g. Insurance" required>
            </div>
            <button type="submit">Add Category</button>
        </form>
    </div>

    <div class="card">
        <h2>Existing Categories</h2>
        <ul>
            {% for c in categories %}
            <li>{{ c.name }}</li>
            {% endfor %}
        </ul>
    </div>

    <div class="actions">
        <a class="btn-secondary" href="/">Back</a>
    </div>

</div>
</body>
</html>
