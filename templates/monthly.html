<!DOCTYPE html>
<html>
<head>
    <title>Monthly Summary</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">

    <h1>Monthly Summary ({{ month }})</h1>

    <div class="card">
        <p><strong>Total Income:</strong> HK$ {{ total_income }}</p>
        <p><strong>Total Expense:</strong> HK$ {{ total_expense }}</p>
        <p><strong>Balance:</strong> HK$ {{ balance }}</p>
    </div>

    <div class="card">
        <h2>Transactions</h2>
        <table>
            <tr>
                <th>Type</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Notes</th>
            </tr>

            {% for t in transactions %}
            <tr>
                <td>{{ t.type }}</td>
                <td>HK$ {{ t.amount }}</td>
                <td>{{ t.category }}</td>
                <td>{{ t.date }}</td>
                <td>{{ t.notes }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>
</body>
</html>
